x-common-keys-core: &common-keys-core
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "200k"
      max-file: "10"

configs:
  ts-serve:
    content: |
      {"TCP":{"443":{"HTTPS":true}},
      "Web":{"$${TS_CERT_DOMAIN}:443":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:80"}}}},
      "AllowFunnel":{"$${TS_CERT_DOMAIN}:443":false}}

services:
  owntrack-tailscale:
    <<: *common-keys-core
    image: tailscale/tailscale:latest
    container_name: owntrack-tailscale
    hostname: owntrack
    networks:
      - owntrack_net
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
      TS_USERSPACE: false
      TS_ENABLE_HEALTH_CHECK: true
      TS_LOCAL_ADDR_PORT: 127.0.0.1:41234
      TS_ACCEPT_DNS: true
      TS_AUTH_ONCE: true
    configs:
      - source: ts-serve
        target: /config/serve.json
    volumes:
      - ./tailscale/state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: always

  owntrack-traefik:
    <<: *common-keys-core
    image: traefik:v2.9
    container_name: owntrack-traefik
    command:
      - --accesslog=true
      - --providers.file.filename=/config/config.yml
      - --entrypoints.web.address=:80
      - --entrypoints.web-secure.address=:443
    network_mode: service:owntrack-tailscale
    volumes:
      - ./traefik:/config

  owntrack-trmnl:
    <<: *common-keys-core
    container_name: owntrack-trmnl
    build:
      context: ./trmnl/
    networks:
      - owntrack_net
    volumes:
      - ./sqllite:/sqllite
    environment:
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:?No AWS Default Region defined}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?No AWS Access Key ID defined}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?No AWS Secret Access Key defined}

networks:
  owntrack_net:
    driver: bridge
